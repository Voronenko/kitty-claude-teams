# kitty-tmux-shim: Kitty configuration additions
# Add these lines to your ~/.config/kitty/kitty.conf
# or include them with: include /path/to/kitty-shim.conf

# Required: Enable remote control for kitten @ commands
allow_remote_control yes

# Recommended: Enable splits layout for horizontal/vertical splitting
enabled_layouts splits

# Optional: Set fake tmux environment so Claude detects it automatically
# This reduces manual setup to just PATH modification in shell config
env TMUX=kitty-shim:/tmp/kitty-shim,$$,0
env TMUX_PANE=%0
